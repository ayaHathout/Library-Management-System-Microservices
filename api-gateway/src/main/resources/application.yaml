spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service-route
              uri: lb://user-service
              predicates:
                - Path=/users/**
            - id: book-service-route
              uri: lb://book-service
              predicates:
                - Path=/books/**, /authors/**, /categories/**, /publishers/**
            - id: user-activity-log-route
              uri: lb://user-activity-log-service
              predicates:
                - Path=/user-activity-logs/**
            - id: borrower-route
              uri: lb://borrower-service
              predicates:
                - Path=/borrowers/**, /borrower-records/**

server:
  port: 8086
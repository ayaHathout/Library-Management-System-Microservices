server.port=8082

spring.application.name=borrower-service

spring.profiles.active=dev

# To know which config server it will get data from
spring.config.import=configserver:http://localhost:8085/

# Circuit Breaker
resilience4j.circuitbreaker.instances.bookService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.bookService.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.bookService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.bookService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.bookService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.bookService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.bookService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.bookService.automaticTransitionFromOpenToHalfOpenEnabled=true

# Retry
resilience4j.retry.instances.bookService.maxAttempts=3
resilience4j.retry.instances.bookService.waitDuration=1s